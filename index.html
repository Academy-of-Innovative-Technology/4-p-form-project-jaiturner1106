!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Club Sign-Up</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <div class="page-wrapper">

    <header>
      <h1>&#9733; Anime Club Sign-Up &#9733;</h1>
      <p class="subtitle">Join the ultimate anime community!</p>
    </header>

    <form id="signupForm" novalidate>

      <!-- Personal Information -->
      <fieldset>
        <legend>Personal Information</legend>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="e.g. NarutoFan99"
            required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Min 8 chars, 1 number, 1 special char"
            pattern="^(?=.*[0-9])(?=.*[!@#$%^&amp;*]).{8,}$"
            title="Must be at least 8 characters, include one number and one special character (!@#$%^&amp;*)"
            required>
        </div>

      </fieldset>

      <!-- Favorite Genre -->
      <fieldset>
        <legend>Favorite Anime Genre</legend>

        <div class="radio-group">
          <label>
            <input type="radio" name="genre" value="action" required>
            Action / Shonen
          </label>

          <label>
            <input type="radio" name="genre" value="romance">
            Romance
          </label>

          <label>
            <input type="radio" name="genre" value="horror">
            Horror / Dark Fantasy
          </label>

          <label>
            <input type="radio" name="genre" value="scifi">
            Sci-Fi
          </label>

          <label>
            <input type="radio" name="genre" value="slice-of-life">
            Slice of Life
          </label>
        </div>

      </fieldset>

      <!-- Favorite Shows -->
      <fieldset>
        <legend>Shows You Watch</legend>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" name="shows" value="arcane">
            Arcane
          </label>

          <label>
            <input type="checkbox" name="shows" value="jjk">
            Jujutsu Kaisen
          </label>

          <label>
            <input type="checkbox" name="shows" value="komi">
            Komi Can't Communicate
          </label>

          <label>
            <input type="checkbox" name="shows" value="bluelock">
            Blue Lock
          </label>

          <label>
            <input type="checkbox" name="shows" value="dragonball">
            Dragon Ball
          </label>

          <label>
            <input type="checkbox" name="shows" value="avatar">
            Avatar: The Last Airbender
          </label>
        </div>

      </fieldset>

      <!-- Favorite Character (Datalist) -->
      <fieldset>
        <legend>Favorite Character</legend>

        <div class="form-group">
          <label for="favCharacter">Pick or type your favorite character</label>
          <input
            type="text"
            id="favCharacter"
            name="favCharacter"
            list="characterList"
            placeholder="Start typing a name..."
            required>

          <datalist id="characterList">
            <option value="Gojo Satoru">
            <option value="Yuji Itadori">
            <option value="Goku">
            <option value="Vegeta">
            <option value="Isagi Yoichi">
            <option value="Komi Shouko">
            <option value="Aang">
            <option value="Jinx">
          </datalist>
        </div>

      </fieldset>

      <!-- Submit -->
      <div class="submit-area">
        <input type="submit" value="Join the Club!">
      </div>

    </form>

  </div>

  <script src="script.js"></script>
</body>

</html>
